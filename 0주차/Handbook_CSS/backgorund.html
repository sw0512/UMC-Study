<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<title>Background 실습</title>

<style>

body{
  font-family: Arial;
}

/* 공통 박스 */
.box{
  width:500px;
  height:300px;
  border:3px solid black;
  margin:20px auto;

  /* 기본 상태 (Before) */
  background-image:url("100.jpg");

  /* 반복 제거 */
  background-repeat:no-repeat;

  /* 위치 변경 */
  background-position:center;

  /* 크기 조정 */
  background-size:cover;

}



</style>

</head>

<body>

<h1 style="text-align: center;">Background 실습</h1>

<div class="box"></div>


</body>
</html>
