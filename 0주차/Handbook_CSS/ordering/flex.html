<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>center align practice</title>
<style>
*{
  margin:0;
  box-sizing:border-box;
}

/* 부모 컨테이너 */
.container{
  display: inline-flex;
  width:600px;
  height:400px;
  background-color:lightgray;
  border:3px solid black;

  justify-content: center;
  align-items: center;
  gap: 3px;
}

/* 정렬할 박스 */
.box{
  width:150px;
  height:150px;
  background-color:purple;
  border:3px solid black;
  color:white;
}

</style>
</head>

<body>

<h2>가운데 정렬 실습</h2>
<div class="container">
  <div class="box">BOX1</div>
  <div class="box">BOX2</div>
  <div class="box">BOX3</div>
</div>

</body>

</html>
