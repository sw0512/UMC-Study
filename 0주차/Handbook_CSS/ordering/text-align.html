<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>center align practice</title>
<style>
*{
  margin:0;
  box-sizing:border-box;
}

/* 부모 컨테이너 */
.container{
  width:600px;
  height:400px;
  background-color:lightgray;
  border:3px solid black;  
  text-align: center;
}

/* 정렬할 박스 */
.box{
  display: inline-block;
  width:150px;
  height:150px;
  background-color:purple;
  color:white;
  text-align: center;
}

</style>
</head>

<body>

<h2>가운데 정렬 실습</h2>

<div class="container">
  <div class="box">BOX</div>
</div>

</body>

</html>
