<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>애니메이션 실습</title>
<style>
    body{
        margin: 100px;
    }

    .ball{
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background-color: purple;
        
        animation: bounceBall 1.5s ease-in 0s infinite alternate;
    }

    @keyframes bounceBall {
        from{
            transform: translateY(0);

        }
        to{
            transform: translateY(200px) scale(1.1,0.9);
        }
    }
</style>
</head>
<body>
    <div class="ball"></div>
</body>
</html>
