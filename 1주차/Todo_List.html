<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>UMC Study Plan</title>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body{
        background-color: #eef2f7;
    }

    main{
        text-align: center;
    }

    hr{
        margin: auto;
        max-width: 720px;
        border: 1px solid grey;
    }

    header{
        text-align: center;
        padding: 80px 0 40px;
    }
    header h1{
        font-size: 48px;
    }
    
    .todo-input{
        display: flex;
        justify-content: center;
        margin: 10px;
    }
    #todoInput{
        width: 600px;
        height: 50px;
        padding: 10px;
        font-size: 16px;
        font-style: italic;

        border: 2px solid #5a7bd8;
        border-radius: 6px;
    }

    main{
        width: 600px;
        margin: auto;
    }

    .todo-container{
        display: flex;
        justify-content: space-between;
    }

    .todo-section,
    .done-section{
        width: 40%
    }

    h3{
        text-align: center;
        margin-bottom: 20px;
    }

    ul{
        list-style: none;
    }

    li{
        display: flex;
        font-weight: 600;
        justify-content: space-between;
        align-items: center;
        padding:10px;
        margin-bottom:10px;

        border-bottom:2px solid #d0d7e2;
    }

    button{
    padding:5px 10px;
    border:none;
    border-radius:4px;
    cursor:pointer;
    }

    .complete{
    background:#5a7bd8;
    color:white;
    }

    .delete{
    background:#ff5b5b;
    color:white;
    }
</style>
</head>   
<body>
<header>
    <h1>Study Plan</h1>
</header>
<hr>
<main>
    <section class="todo-input">
        <input id="todoInput" type="text" placeholder="스터디 계획을 작성해보세요!">
    </section>
    <div class="todo-container">
        <section class="todo-section">
            <h3>해야 할 일</h3>
            <ul id="todoList"></ul>
        </section>
        <section class="done-section">
            <h3>해낸 일</h3>
            <ul id="doneList"></ul>
        </section>
    </div>
</main>
<script src="TL_script.js"></script> 
</body>
</html>
